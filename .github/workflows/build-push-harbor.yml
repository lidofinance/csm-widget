name: Build and push csm-widget to Harbor

on:
  workflow_dispatch:
  push:
    branches:
      - feature/csm-plus-cm

permissions:
  contents: read

env:
  APP: csm-widget
  REGISTRY: harbor.dev.k8s-dev.org
  REPOSITORY: team-csm
  REGISTRY_USER: robot$team-csm-rw
  IMAGE_TAG: dev

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Generate build-info.json
        env:
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          jq -n \
            --arg version "${BRANCH}:${COMMIT}" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT" \
            '{version: $version, branch: $branch, commit: $commit}' \
            > build-info.json
          cat build-info.json

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3.3.0

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}

      - name: Build and push docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.APP }}:${{ env.IMAGE_TAG }}
          builder: ${{ steps.buildx.outputs.name }}
